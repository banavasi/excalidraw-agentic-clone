server {
    listen 80;
    server_name sync.shashankshandilya.me;

    # Edge defense-in-depth: reject bodies above the app's MAX_BODY_BYTES (36 MiB)
    # with headroom. The app enforces the real cap too (the tailnet bind bypasses nginx).
    client_max_body_size 40m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # The sync API (includes /sync/healthz). Everything else 404s.
    location /sync/ {
        proxy_pass http://127.0.0.1:8789/sync/;
    }

    location / { return 404; }
}

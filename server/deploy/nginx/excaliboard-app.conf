# Excaliboard editor — static self-host (Phase 3 web) + same-origin sync API (Phase 6).
# Served behind cloudflared (*.shashankshandilya.me -> nginx :80) + Cloudflare Access
# (email). nginx only routes by Host; Access auth is enforced at the Cloudflare edge,
# which injects the verified Cf-Access-Jwt-Assertion the sync app re-verifies.
server {
    listen 80;
    server_name app.shashankshandilya.me;

    root /var/www/excaliboard-app;
    index index.html;

    # Sync API, SAME-ORIGIN under the Access-gated host (Phase 6): the browser's
    # fetch("/sync/…") rides the CF_Authorization cookie automatically — no CORS, no
    # token to paste. Cloudflare forwards the verified Cf-Access-Jwt-Assertion header.
    location /sync/ {
        proxy_pass http://127.0.0.1:8789/sync/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Images upload through here; mirror the sync vhost's body cap (app caps too).
        client_max_body_size 40m;
    }

    # Fingerprinted assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The PWA shell + service worker must revalidate so a redeploy is never pinned
    # to a stale build (VitePWA registerType: autoUpdate).
    location = /index.html             { add_header Cache-Control "no-cache"; }
    location = /sw.js                  { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest   { add_header Cache-Control "no-cache"; }

    # SPA fallback — client-side routing (hash + room/library URLs).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

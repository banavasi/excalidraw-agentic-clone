# Excaliboard editor — static self-host (Phase 3 web) + same-origin API (Phase 7).
# Served behind cloudflared (*.shashankshandilya.me -> nginx :80). As of Phase 7,
# identity is the app's OWN account system (session cookie); Cloudflare Access, if
# kept, is only a network gate in front — no longer the identity source.
server {
    listen 80;
    server_name app.shashankshandilya.me;

    root /var/www/excaliboard-app;
    index index.html;

    # API, SAME-ORIGIN: the browser's fetch("/auth|/sync|/oauth|/admin/…") rides the
    # in-app session cookie automatically (no CORS, no token to paste). Common proxy
    # settings at server scope so each API location just needs proxy_pass.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    location /auth/  { proxy_pass http://127.0.0.1:8789/auth/; }
    location /oauth/ { proxy_pass http://127.0.0.1:8789/oauth/; }
    location /admin/ { proxy_pass http://127.0.0.1:8789/admin/; }
    location /sync/ {
        proxy_pass http://127.0.0.1:8789/sync/;
        # Images upload through here; mirror the sync vhost's body cap (app caps too).
        client_max_body_size 40m;
    }

    # Fingerprinted assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The PWA shell + service worker must revalidate so a redeploy is never pinned
    # to a stale build (VitePWA registerType: autoUpdate).
    location = /index.html             { add_header Cache-Control "no-cache"; }
    location = /sw.js                  { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest   { add_header Cache-Control "no-cache"; }

    # SPA fallback — client-side routing (hash + room/library URLs).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

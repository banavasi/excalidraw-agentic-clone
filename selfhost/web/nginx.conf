# Excaliboard self-host web vhost: serves the built editor and proxies the API
# paths to the `api` service so the browser is always same-origin (the session
# cookie is SameSite=Lax).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 40m;

    # Common proxy settings (apply to every location that proxy_passes below).
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- API (FastAPI) ---
    location /auth/  { proxy_pass http://api:8789/auth/; }
    location /sync/  { proxy_pass http://api:8789/sync/; }
    location /oauth/ { proxy_pass http://api:8789/oauth/; }
    location /admin/ { proxy_pass http://api:8789/admin/; }

    # --- static editor ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    # PWA shell must revalidate so a redeploy is never pinned to a stale build.
    location = /index.html           { add_header Cache-Control "no-cache"; }
    location = /sw.js                { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }

    # SPA fallback — client-side routes (/login, /signup, /reset, /device, /manage).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Excaliboard — self-hostable, multi-user whiteboard. One command:
#   cp .env.example .env   # then set DB_PASSWORD + SECRET_KEY
#   docker compose up --build
# Open http://localhost:8080. The first account that signs up with the email in
# ADMIN_EMAIL becomes the admin.
name: excaliboard

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: excaliboard
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: excaliboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excaliboard"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ../server
    environment:
      DATABASE_URL: postgresql://excaliboard:${DB_PASSWORD}@db:5432/excaliboard
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env  (openssl rand -hex 32)}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      CORS_ORIGINS: ${PUBLIC_URL:-http://localhost:8080}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Excaliboard <no-reply@localhost>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FLEET_OBS_DISABLE: "1"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # No published port — only the web service (same Docker network) reaches it.

  web:
    build:
      context: ..
      dockerfile: selfhost/web/Dockerfile
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
